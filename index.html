<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Water Hole</title>
	<style>
		@import url("https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700;800&family=Nunito:wght@700;800&display=swap");

		:root {
			--sky-top: #d6f6ff;
			--sky-bottom: #f5fff7;
			--panel: #ffffff;
			--panel-border: #9ec6d2;
			--ink: #123248;
			--mud: #a46b3a;
			--mud-dark: #6d431f;
			--water: #27a8d8;
			--water-deep: #0f7eaa;
			--pollution: #f1994a;
			--pollution-danger: #db4d3d;
			--button-shovel: #f5b436;
			--button-extractor: #57c586;
			--shadow-soft: 0 10px 24px rgba(18, 50, 72, 0.15);
		}

		* {
			box-sizing: border-box;
		}

		body {
			margin: 0;
			min-height: 100vh;
			display: flex;
			justify-content: center;
			align-items: center;
			padding: 1rem;
			font-family: "Baloo 2", "Trebuchet MS", sans-serif;
			color: var(--ink);
			background:
				radial-gradient(circle at 12% 20%, rgba(39, 168, 216, 0.2) 0, rgba(39, 168, 216, 0) 35%),
				radial-gradient(circle at 85% 90%, rgba(87, 197, 134, 0.22) 0, rgba(87, 197, 134, 0) 42%),
				linear-gradient(170deg, var(--sky-top), var(--sky-bottom));
		}

		.game {
			width: min(100%, 430px);
			background: var(--panel);
			border: 3px solid var(--panel-border);
			border-radius: 26px;
			padding: 0.9rem 0.9rem 1.1rem;
			box-shadow: var(--shadow-soft);
			animation: pop-in 420ms ease-out;
		}

		.pollution-bar-container {
			height: 18px;
			border-radius: 999px;
			background: #ebf4f7;
			border: 2px solid #a9c6cf;
			overflow: hidden;
		}

		.pollution-bar {
			height: 100%;
			width: 38%;
			background: linear-gradient(90deg, var(--pollution), var(--pollution-danger));
			border-radius: 999px;
			transition: width 240ms ease;
		}

		.game-header {
			display: flex;
			justify-content: space-between;
			gap: 0.6rem;
			margin-top: 0.7rem;
			font-family: "Nunito", "Verdana", sans-serif;
			font-size: 0.95rem;
			letter-spacing: 0.02em;
			font-weight: 800;
		}

		.timer,
		.points {
			flex: 1;
			text-align: center;
			padding: 0.35rem 0.5rem;
			border-radius: 12px;
			background: #f3fbff;
			border: 2px solid #b8d6e0;
		}

		.game-main {
			margin-top: 0.95rem;
			display: grid;
			grid-template-columns: 54px 1fr 92px;
			gap: 0.75rem;
			align-items: center;
		}

		.water-reservoir-container {
			height: 256px;
			border-radius: 999px;
			border: 3px solid #93bdcb;
			background: linear-gradient(180deg, #ecf7fb, #d5edf7);
			padding: 6px;
			display: flex;
			align-items: flex-end;
			overflow: hidden;
		}

		.water-reservoir {
			width: 100%;
			height: 66%;
			border-radius: 999px;
			background: linear-gradient(180deg, #5ac6ea, var(--water-deep));
			box-shadow: inset 0 10px 14px rgba(255, 255, 255, 0.25);
			animation: wave 3.2s ease-in-out infinite;
		}

		.holes-grid {
			display: flex;
			flex-direction: column;
			gap: 0.65rem;
		}

		.hole-row {
			display: grid;
			grid-template-columns: repeat(4, minmax(0, 1fr));
			gap: 0.55rem;
		}

		.hole {
			width: 100%;
			aspect-ratio: 1 / 1;
			border-radius: 50%;
			background:
				radial-gradient(circle at 32% 28%, #cb8e5a 0 16%, transparent 18%),
				radial-gradient(circle at 48% 46%, var(--mud-dark) 0 38%, #4f2d15 58%, #2b170b 100%);
			border: 2px solid #6a3f1e;
			box-shadow:
				inset 0 8px 10px rgba(0, 0, 0, 0.34),
				0 4px 0 #c49369;
			animation: reveal 480ms ease both;
		}

		.hole-row .hole:nth-child(1) {
			animation-delay: 80ms;
		}

		.hole-row .hole:nth-child(2) {
			animation-delay: 130ms;
		}

		.hole-row .hole:nth-child(3) {
			animation-delay: 180ms;
		}

		.hole-row .hole:nth-child(4) {
			animation-delay: 230ms;
		}

		.tool-buttons {
			display: flex;
			flex-direction: column;
			gap: 0.75rem;
			align-items: center;
		}

		.tool-button {
			width: 84px;
			height: 84px;
			border-radius: 50%;
			border: 3px solid #ffffff;
			font-family: "Nunito", "Verdana", sans-serif;
			font-size: 0.9rem;
			font-weight: 800;
			letter-spacing: 0.01em;
			color: #0f2a3d;
			cursor: pointer;
			box-shadow: 0 8px 0 rgba(18, 50, 72, 0.2);
			transition: transform 160ms ease, box-shadow 160ms ease;
		}

		#shovelButton {
			background: linear-gradient(180deg, #ffd478, var(--button-shovel));
		}

		#extractorButton {
			background: linear-gradient(180deg, #9be0b6, var(--button-extractor));
		}

		.tool-button:hover,
		.tool-button:focus-visible {
			transform: translateY(-2px);
			box-shadow: 0 10px 0 rgba(18, 50, 72, 0.2);
		}

		.tool-button:active {
			transform: translateY(2px);
			box-shadow: 0 5px 0 rgba(18, 50, 72, 0.2);
		}

		@media (min-width: 768px) {
			body {
				padding: 2rem;
			}

			.game {
				width: min(100%, 760px);
				padding: 1.2rem 1.2rem 1.4rem;
			}

			.game-header {
				font-size: 1.15rem;
			}

			.game-main {
				grid-template-columns: 68px 1fr 110px;
				gap: 1.35rem;
			}

			.water-reservoir-container {
				height: 320px;
			}

			.holes-grid {
				gap: 1rem;
			}

			.hole-row {
				gap: 0.95rem;
			}

			.tool-button {
				width: 102px;
				height: 102px;
				font-size: 1rem;
			}
		}

		@keyframes pop-in {
			from {
				opacity: 0;
				transform: translateY(14px) scale(0.98);
			}
			to {
				opacity: 1;
				transform: translateY(0) scale(1);
			}
		}

		@keyframes reveal {
			from {
				opacity: 0;
				transform: scale(0.86) translateY(10px);
			}
			to {
				opacity: 1;
				transform: scale(1) translateY(0);
			}
		}

		@keyframes wave {
			0%,
			100% {
				transform: translateY(0);
			}
			50% {
				transform: translateY(3px);
			}
		}
	</style>
</head>
<body>
	<div class="game" id="water-hole-game">
		<div class="pollution-bar-container" id="pollutionBarContainer" aria-label="Pollution bar">
			<div class="pollution-bar" id="pollutionBar"></div>
		</div>

		<header class="game-header">
			<div class="timer" id="timer">Timer: 00:00</div>
			<div class="points" id="points">Points: 0</div>
		</header>

		<main class="game-main">
			<aside class="water-reservoir-container" id="waterReservoirContainer" aria-label="Water reservoir">
				<div class="water-reservoir" id="waterReservoir"></div>
			</aside>

			<section class="holes-grid" id="holesGrid" aria-label="2 by 4 hole grid">
				<div class="hole-row">
					<div class="hole" id="hole-1"></div>
					<div class="hole" id="hole-2"></div>
					<div class="hole" id="hole-3"></div>
					<div class="hole" id="hole-4"></div>
				</div>
				<div class="hole-row">
					<div class="hole" id="hole-5"></div>
					<div class="hole" id="hole-6"></div>
					<div class="hole" id="hole-7"></div>
					<div class="hole" id="hole-8"></div>
				</div>
			</section>

			<aside class="tool-buttons" aria-label="Tools">
				<button type="button" class="tool-button circular" id="shovelButton">Shovel</button>
				<button type="button" class="tool-button circular" id="extractorButton">Extractor</button>
			</aside>
		</main>
	</div>
</body>
</html>
